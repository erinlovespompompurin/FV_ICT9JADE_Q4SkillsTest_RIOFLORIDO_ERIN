<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        margin: 0;
       background-image: url("https://applescoop.org/image/wallpapers/mac/soft-gradient-white-29-09-2024-1727597249-hd-wallpaper.jpeg");
    }

    .main-container {
        display: flex;
        min-height: 100vh;
        
    }

    .sidebar {
        width: 200px;
        background-color: #1f2933;
        color: white;
        padding: 20px;
    }

    .nav-link {
        color: white;
    }

    .nav-link:hover {
        background-color: rgba(255,255,255,0.2);
        border-radius: 5px;
    }


    .content {
        flex: 1;
        padding: 30px;
    }


    .title-box {
        display: inline-block;
        background-color: #1f2933;
        color: white;
        padding: 8px 16px;
        border-radius: 10px;
        font-weight: bold;
    }

    .subject-card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .subject-card h5 {
        margin: 0;
    }

    .subject-card p {
        margin: 0;
        font-size: 14px;
        color: gray;
    }
</style>
</head>
<body>

<div class="main-container">

<div class="sidebar">
    <h5>Menu</h5>
    <ul class="nav flex-column">
        <li><a class="nav-link" href="#">Dashboard</a></li>
        <li><a class="nav-link" href="#">Virtual Notebooks</a></li>
        <li><a class="nav-link" href="#">Tasks</a></li>
        <li><a class="nav-link" href="#">Profile</a></li>
        <li><a class="nav-link" href="index.html">Logout</a></li>
    </ul>
</div>

<div class="content">

    <div class="mb-4">
        <div class="title-box">NOTEBOOKS</div>
        <p class="text-muted mt-2">Select a subject.</p>
    </div>

    <div class="row g-3">

        <div class="col-md-4">
            <div class="subject-card">
                <h5>Filipino</h5>
                <p>9-Lily 2025-2026</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="subject-card">
                <h5>English</h5>
                <p>9-Lily 2025-2026</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="subject-card">
                <h5>Math</h5>
                <p>9-Lily 2025-2026</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="subject-card">
                <h5>Science</h5>
                <p>9-Lily 2025-2026</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="subject-card">
                <h5>Social Studies</h5>
                <p>9-Lily 2025-2026</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="subject-card">
                <h5>Values Education</h5>
                <p>9-Lily 2025-2026</p>
            </div>
        </div>

    </div>

</div>
</div>

</html>
